<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatVis | Bernoulli & Gaussian Viz</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <header>
            <h1>StatVis</h1>
            <p>Initial project setup - Foundations for the Gaussian Convergence Visualizer.</p>
        </header>

        <main>
            <div class="canvas-container">
                <canvas id="vizCanvas"></canvas>
            </div>

            <div class="controls" id="simControls">
                <!-- Day 3: Adding interactive sliders -->
                <div class="control-group">
                    <label for="speedSlider">Sim Speed (<span id="speedVal">5</span>)</label>
                    <input type="range" id="speedSlider" min="1" max="50" value="5">
                </div>
                
                <div class="control-group">
                    <label for="batchSlider">Batch Size (<span id="batchVal">10</span>)</label>
                    <input type="range" id="batchSlider" min="1" max="100" value="10">
                </div>
                
                <button id="resetBtn">Reset</button>
            </div>
        </main>
    </div>
    <script src="script.js?v=4"></script>
</body>

</html>
